
# Agent Configuration
# This file defines the models, their roles, capabilities, and loading arguments.

# Communication settings
communication:
  timeout: 30.0  # seconds
  max_retries: 3
  retry_delay: 1.0  # seconds

# Model settings
models:
  # ── Model setup ─────────────────────────────────────────────────────────────
  # With LM Studio selected as provider, models are loaded in LM Studio and
  # accessed via localhost:1234.  The path/device/dtype fields below only apply
  # when using direct HuggingFace loading (provider = "local" without LM Studio).
  #
  # Recommended split for 8 GB VRAM (RTX 2070):
  #   brain    → any ~9B reasoning model at Q4_K_M  (~5 GB VRAM)
  #   executor → any ~1B tool-call model at Q4_K_M  (~1 GB VRAM)
  # Select actual model names in the IRIS Settings → Configure → Models card.
  - id: "executor"
    path: "./models/LFM2.5-1.2B-Instruct"
    capabilities: ["tool_execution", "instruction_following"]
    constraints:
      device: "cpu"
      dtype: "float32"
    optional: true   # optional=true: startup continues if file is missing

  - id: "vision"
    # LFM2.5-VL runs via llama-server on port 8081, exposed as vision.* MCP tools in AgentToolBridge.
    # No path needed — VisionMCPServer is registered directly in tool_bridge._mcp_servers.
    # LAZY LOAD: does NOT start at backend startup. Activated by vision_enabled toggle in frontend.
    path: null
    capabilities: ["vision", "gui_interaction"]
    constraints:
      vision_server_url: "http://localhost:8081/v1"
      auto_load: false
    optional: true

  - id: "gguf_local"
    # GGUF brain models via llama-cpp-python server on port 8082 (OpenAI-compatible).
    # NEVER auto-loaded — only spawns when user selects a model in the Models Browser.
    # Managed by LocalModelManager in backend/agent/local_model_manager.py.
    path: null
    capabilities: ["conversation", "tool_execution", "reasoning"]
    constraints:
      inference_server_url: "http://127.0.0.1:8082/v1"
      auto_load: false
    optional: true

# Tool execution settings
tool_execution:
  max_concurrent: 5
  default_timeout: 30.0
  enable_security: true
